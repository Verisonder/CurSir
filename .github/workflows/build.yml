name: Build CurSir

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Option A leftover: a single frozen exe (kept as an alternative download)
  exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pyinstaller PySide6 pynput
      - run: pyinstaller --noconfirm --onefile --windowed --icon cursir.ico --name CurSir cursir.py
      - name: Publish exe to Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CurSir.exe
          generate_release_notes: true

  # Option B: the cat's model — bundled Python + libs + source, self-updating
  portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble portable bundle
        shell: pwsh
        run: |
          $ver = "3.12.7"
          Invoke-WebRequest "https://www.python.org/ftp/python/$ver/python-$ver-embed-amd64.zip" -OutFile embed.zip
          New-Item -ItemType Directory -Force -Path CurSir | Out-Null
          Expand-Archive embed.zip -DestinationPath CurSir -Force
          # enable site-packages in the embeddable interpreter
          $pth = (Get-ChildItem CurSir\python*._pth)[0].FullName
          (Get-Content $pth) -replace '#\s*import site','import site' | Set-Content $pth
          Add-Content $pth "Lib\site-packages"
          # bootstrap pip, install the deps into the bundle
          Invoke-WebRequest "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
          .\CurSir\python.exe get-pip.py --no-warn-script-location
          .\CurSir\python.exe -m pip install --no-warn-script-location PySide6 pynput
          # app files
          Copy-Item cursir.py CurSir\
          Copy-Item cursir.ico CurSir\
          # silent launcher (runs pythonw hidden — no console flash)
          $vbs = @"
          Set s = CreateObject("WScript.Shell")
          base = CreateObject("Scripting.FileSystemObject").GetParentFolderName(WScript.ScriptFullName)
          s.CurrentDirectory = base
          s.Run """" & base & "\pythonw.exe"" """ & base & "\cursir.py""", 0, False
          "@
          Set-Content -Path CurSir\CurSir.vbs -Value $vbs -Encoding ASCII
          Compress-Archive -Path CurSir\* -DestinationPath CurSir-portable.zip -Force
      - name: Publish portable bundle to Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CurSir-portable.zip
