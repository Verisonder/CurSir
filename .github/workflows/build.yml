name: Build CurSir

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble bundle + build installer .exe
        shell: pwsh
        run: |
          $ver = "3.12.7"
          # 1) bundled Python runtime
          Invoke-WebRequest "https://www.python.org/ftp/python/$ver/python-$ver-embed-amd64.zip" -OutFile embed.zip
          New-Item -ItemType Directory -Force -Path CurSir | Out-Null
          Expand-Archive embed.zip -DestinationPath CurSir -Force
          $pth = (Get-ChildItem CurSir\python*._pth)[0].FullName
          (Get-Content $pth) -replace '#\s*import site','import site' | Set-Content $pth
          Add-Content $pth "Lib\site-packages"
          # 2) pip + deps into the bundle
          Invoke-WebRequest "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
          .\CurSir\python.exe get-pip.py --no-warn-script-location
          .\CurSir\python.exe -m pip install --no-warn-script-location PySide6 pynput
          # 3) app files
          Copy-Item cursir.py CurSir\
          Copy-Item cursir.ico CurSir\
          # 4) build the installer with Inno Setup
          choco install innosetup -y --no-progress
          $appver = (Get-Content VERSION).Trim()
          $iss = @"
          [Setup]
          AppName=CurSir
          AppVersion=$appver
          DefaultDirName={localappdata}\CurSir
          DisableProgramGroupPage=yes
          PrivilegesRequired=lowest
          OutputBaseFilename=CurSir-Setup
          SetupIconFile=cursir.ico
          UninstallDisplayIcon={app}\cursir.ico
          Compression=lzma2
          SolidCompression=yes
          [Files]
          Source: "CurSir\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs
          [Icons]
          Name: "{userdesktop}\CurSir"; Filename: "{app}\pythonw.exe"; Parameters: """{app}\cursir.py"""; IconFilename: "{app}\cursir.ico"; WorkingDir: "{app}"
          Name: "{userprograms}\CurSir"; Filename: "{app}\pythonw.exe"; Parameters: """{app}\cursir.py"""; IconFilename: "{app}\cursir.ico"; WorkingDir: "{app}"
          [Run]
          Filename: "{app}\pythonw.exe"; Parameters: """{app}\cursir.py"""; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path cursir.iss -Value $iss -Encoding ASCII
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" cursir.iss

      - name: Publish installer to Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/CurSir-Setup.exe
          generate_release_notes: true
